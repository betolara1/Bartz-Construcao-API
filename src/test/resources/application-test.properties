# Test profile — uses H2 in-memory database, disables Flyway,
# and provides dummy JWT/auth values so the context loads.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (schema is auto-created by Hibernate)
spring.flyway.enabled=false

# Disable Docker Compose for tests
spring.docker.compose.enabled=false

# JWT config — dummy values for tests
jwt.secret-key=test-secret-key-that-is-at-least-32-characters-long
jwt.expiration-time=86400000
jwt.excluded-paths=/auth/login, /public/**, /swagger-ui/**, /actuator/**

# Auth config — dummy values for tests
auth.admin.user=testadmin
auth.admin.password=testpassword
